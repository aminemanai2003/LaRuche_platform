api:
  dashboard: true
  insecure: true   # dev only — exposes :8080 dashboard without auth

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    exposedByDefault: false
    network: wealthmesh
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

accessLog: {}
