apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice
  namespace: wealthmesh
  labels:
    app: voice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice
  template:
    metadata:
      labels:
        app: voice
    spec:
      containers:
        - name: voice
          image: wealthmesh/voice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: wealthmesh-env
            - secretRef:
                name: wealthmesh-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: voice
  namespace: wealthmesh
spec:
  selector:
    app: voice
  ports:
    - port: 8006
      targetPort: 8006
  type: ClusterIP
