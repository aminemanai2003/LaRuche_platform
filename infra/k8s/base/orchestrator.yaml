apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: wealthmesh
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: wealthmesh/orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: wealthmesh-env
            - secretRef:
                name: wealthmesh-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: wealthmesh
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
