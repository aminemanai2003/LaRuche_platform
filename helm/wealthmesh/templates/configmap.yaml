apiVersion: v1
kind: ConfigMap
metadata:
  name: wealthmesh-env
  namespace: {{ .Release.Namespace }}
data:
  OLLAMA_BASE_URL: {{ .Values.config.ollamaUrl | quote }}
  OLLAMA_MODEL: {{ .Values.config.ollamaModel | quote }}
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  LANGFUSE_HOST: {{ .Values.config.langfuseHost | quote }}
  SMTP_HOST: {{ .Values.config.smtpHost | quote }}
  SMTP_PORT: {{ .Values.config.smtpPort | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | toString | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  AGENT_FINANCIAL_URL: "http://agent-financial:8001"
  AGENT_MARKET_URL: "http://agent-market:8002"
  AGENT_DOCS_URL: "http://agent-docs:8003"
  AGENT_ACTION_URL: "http://agent-action:8004"
  AGENT_QA_URL: "http://agent-qa:8005"
  ORCHESTRATOR_URL: "http://orchestrator:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: wealthmesh-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  KEYCLOAK_URL: {{ .Values.keycloak.url | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.keycloak.clientId | quote }}
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
